name: Daily TikTok Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

# This tells GitHub to use the new Node 24 engine for everything in this file
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Updated to v6 for Node 24 support
      - name: Checkout Code
        uses: actions/checkout@v6

      # Updated to v6 for Node 24 support
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install requests pandas

      - name: Run TikTok Tracker
        run: |
          python tracker.py || echo "Scraper failed, but continuing"

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -f tiktok_daily_stats.csv ]; then
            git add tiktok_daily_stats.csv
            git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No new data"
            git push
          else
            echo "Error: File not found."
            exit 1
          fi
